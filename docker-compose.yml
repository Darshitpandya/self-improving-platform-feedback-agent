services:
  pgvector:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${PGVECTOR_DB:-feedback_agent}
      POSTGRES_USER: ${PGVECTOR_USER:-agent}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:?Set PGVECTOR_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
